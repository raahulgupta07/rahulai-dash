# =============================================================================
# CityAgent Analytics - BUILD FROM SOURCE (own image, never pull upstream)
# =============================================================================
# Builds the app from THIS repo's Dockerfile instead of pulling
# bagofwords/bagofwords:latest. Use this for all hybrid-brain work so our
# branch's code actually ships.
#
#   docker compose -f docker-compose.build.yaml build
#   docker compose -f docker-compose.build.yaml up -d
#
# Reads the same .env (POSTGRES_*, APP_PORT, DASH_ENCRYPTION_KEY).
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18   # PG18 + pgvector preinstalled (Phase 8 embeddings/graph)
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - ca_postgres_data:/var/lib/postgresql   # PG18+: mount the parent (data lands in a major-version subdir), NOT /data
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ca-network

  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6399}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ca-network

  app:
    # Self-contained build — `docker compose up -d --build` builds everything
    # (runtime base folded into Dockerfile). App image = cityagent-analytics:dev.
    build:
      context: .
      dockerfile: Dockerfile
    image: cityagent-analytics:dev
    container_name: ca-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3007}:3000"
    environment:
      - ENVIRONMENT=production
      - DASH_DATABASE_URL=postgresql://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dashpassword}@postgres:5432/${POSTGRES_DB:-dash}
      - DASH_ENCRYPTION_KEY=${DASH_ENCRYPTION_KEY:-}
      - DASH_LICENSE_KEY=${DASH_LICENSE_KEY:-}
      - DASH_CONFIG_PATH=/app/dash-config.yaml
      # Tier-2 scale-out: Redis backs the per-user skill-run concurrency cap across replicas.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Skill-execution safety knobs (Tier-1). Safe defaults; override in .env.
      - SKILL_EXEC_TIMEOUT_S=${SKILL_EXEC_TIMEOUT_S:-60}
      - SKILL_MAX_CONCURRENT_PER_USER=${SKILL_MAX_CONCURRENT_PER_USER:-2}
      - SKILL_EXEC_MEM_CAP_MB=${SKILL_EXEC_MEM_CAP_MB:-}
      - SKILL_PER_USER_ASSETS=${SKILL_PER_USER_ASSETS:-0}
      # Hybrid feature flags — default OFF (:-0) so a fresh deploy == upstream dash.
      # Toggle any via .env (e.g. HYBRID_QUERY_CACHE=1) then `up -d --force-recreate`.
      - HYBRID_DUAL_SCHEMA=${HYBRID_DUAL_SCHEMA:-0}
      - HYBRID_ENGINEER_ASSETS=${HYBRID_ENGINEER_ASSETS:-0}
      - HYBRID_ANSWER_CACHE=${HYBRID_ANSWER_CACHE:-0}
      - HYBRID_BRAIN_READ=${HYBRID_BRAIN_READ:-0}
      - HYBRID_DISTILLER=${HYBRID_DISTILLER:-0}
      - HYBRID_QUERY_CACHE=${HYBRID_QUERY_CACHE:-0}
      - HYBRID_SKILLS=${HYBRID_SKILLS:-0}
      - HYBRID_FEDERATION=${HYBRID_FEDERATION:-0}
      - HYBRID_BRAIN_GRAPH=${HYBRID_BRAIN_GRAPH:-0}
      - HYBRID_INSIGHT_DAEMON=${HYBRID_INSIGHT_DAEMON:-0}
      - HYBRID_QUOTAS=${HYBRID_QUOTAS:-0}
      - HYBRID_SEMANTIC_LAYER=${HYBRID_SEMANTIC_LAYER:-0}
      - HYBRID_METRICS_CATALOG=${HYBRID_METRICS_CATALOG:-0}
      - HYBRID_AUTOMAP=${HYBRID_AUTOMAP:-0}
      - HYBRID_COMPLIANCE_GATE=${HYBRID_COMPLIANCE_GATE:-0}
      - HYBRID_COLUMN_INTEL=${HYBRID_COLUMN_INTEL:-0}
      - HYBRID_AUTO_QUERIES=${HYBRID_AUTO_QUERIES:-0}
      - HYBRID_AUTO_EVALS=${HYBRID_AUTO_EVALS:-0}
      - HYBRID_FOLLOWUPS=${HYBRID_FOLLOWUPS:-0}
      - STUDIO_LEARN_DAEMON_ENABLED=${STUDIO_LEARN_DAEMON_ENABLED:-0}
      - HYBRID_STUDIOS=${HYBRID_STUDIOS:-0}
      - HYBRID_GOVERNANCE=${HYBRID_GOVERNANCE:-0}
      - HYBRID_CODE_BANK=${HYBRID_CODE_BANK:-0}
      - HYBRID_MEMORY_LOOP=${HYBRID_MEMORY_LOOP:-0}
      - HYBRID_EVAL_HARNESS=${HYBRID_EVAL_HARNESS:-0}
      - EVAL_SCHEDULE_ENABLED=${EVAL_SCHEDULE_ENABLED:-0}
      - HYBRID_JOIN_GRAPH=${HYBRID_JOIN_GRAPH:-0}
      - JOIN_MINE_ENABLED=${JOIN_MINE_ENABLED:-0}
      - HYBRID_DOC_KNOWLEDGE=${HYBRID_DOC_KNOWLEDGE:-0}
      - HYBRID_AGENT_MEMORY=${HYBRID_AGENT_MEMORY:-0}
      - HYBRID_SUBAGENTS=${HYBRID_SUBAGENTS:-0}
      - HYBRID_SKILL_AUTOGROW=${HYBRID_SKILL_AUTOGROW:-0}
      - HYBRID_BITEMPORAL=${HYBRID_BITEMPORAL:-0}
      - HYBRID_WORKFLOWS=${HYBRID_WORKFLOWS:-0}
      - HYBRID_SKILL_OPTIMIZE=${HYBRID_SKILL_OPTIMIZE:-0}
      - HYBRID_SKILL_OPTIMIZE_DAEMON=${HYBRID_SKILL_OPTIMIZE_DAEMON:-0}
      - HYBRID_CONTEXT_COMPACT=${HYBRID_CONTEXT_COMPACT:-0}
      - HYBRID_CONTEXT_COMPACT_LLM=${HYBRID_CONTEXT_COMPACT_LLM:-0}
      - HYBRID_CONTEXT_COMPACT_RATIO=${HYBRID_CONTEXT_COMPACT_RATIO:-0.75}
      - HYBRID_AMBIGUITY_GATE=${HYBRID_AMBIGUITY_GATE:-0}
      - HYBRID_SCOPE_GATE=${HYBRID_SCOPE_GATE:-1}
      - HYBRID_DASH_VERSIONS=${HYBRID_DASH_VERSIONS:-1}
      # autotrain: upload flat file -> ingest staging -> pending knowledge
      - HYBRID_AUTOTRAIN=${HYBRID_AUTOTRAIN:-0}
      - HYBRID_AUTOTRAIN_QA=${HYBRID_AUTOTRAIN_QA:-0}
      - HYBRID_AUTOTRAIN_PROFILE=${HYBRID_AUTOTRAIN_PROFILE:-0}
      - HYBRID_AUTOTRAIN_ON_INDEX=${HYBRID_AUTOTRAIN_ON_INDEX:-0}
      # restricted staging role (agent-queryability); empty -> register no-ops safely
      - AUTOTRAIN_STAGING_DB_USER=${AUTOTRAIN_STAGING_DB_USER:-}
      - AUTOTRAIN_STAGING_DB_PASSWORD=${AUTOTRAIN_STAGING_DB_PASSWORD:-}
      - AUTOTRAIN_STAGING_DB_HOST=${AUTOTRAIN_STAGING_DB_HOST:-}
      - AUTOTRAIN_STAGING_DB_PORT=${AUTOTRAIN_STAGING_DB_PORT:-}
      - AUTOTRAIN_STAGING_ROLE_SECRET=${AUTOTRAIN_STAGING_ROLE_SECRET:-}
    volumes:
      - ./dash-config.yaml:/app/dash-config.yaml:ro
      - ca_uploads:/app/backend/uploads
      - ca_branding:/app/backend/branding_uploads
      - ca_logs:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - ca-network

volumes:
  ca_postgres_data:
  ca_uploads:
  ca_branding:
  ca_logs:

networks:
  ca-network:
    driver: bridge

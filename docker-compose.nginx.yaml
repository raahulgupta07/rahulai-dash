# =============================================================================
# CityAgent Analytics — nginx reverse proxy stack (HTTP)
# =============================================================================
#
# Use this when you front the app with nginx (the default for this deployment).
# nginx publishes the host port and proxies to the app over the internal network;
# the app itself is NOT published directly (more secure — only nginx is exposed).
#
# Quick start:
#   1. cp .env.example .env        # then edit .env (encryption key, admin, HTTP_PORT)
#   2. docker compose -f docker-compose.nginx.yaml up -d --build
#   3. open http://<server-ip>:<HTTP_PORT>     (HTTP_PORT defaults to 8001)
#
# To change the public port, set HTTP_PORT in .env (e.g. HTTP_PORT=8001) and set
# DASH_BASE_URL to match (http://<server-ip>:8001). For HTTPS, add a 443 server
# block + certs in nginx/nginx.conf, or use the Caddy stack (docker-compose.yaml).
#
# Reads the same .env as the other compose files (POSTGRES_*, DASH_ENCRYPTION_KEY,
# DASH_ADMIN_*, HTTP_PORT).
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18   # PG18 + pgvector preinstalled
    container_name: dash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+: mount parent, not /data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dash-network

  app:
    # Self-contained build — runtime base folded into Dockerfile.
    build:
      context: .
      dockerfile: Dockerfile
    image: cityagent-analytics:dev
    container_name: dash-app
    restart: unless-stopped
    # No host port here on purpose — nginx fronts the app and reaches it over the
    # internal network at app:3000. The container always listens on 3000.
    expose:
      - "3000"
    environment:
      - ENVIRONMENT=production
      - DASH_DATABASE_URL=postgresql://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dashpassword}@postgres:5432/${POSTGRES_DB:-dash}
      - DASH_ENCRYPTION_KEY=${DASH_ENCRYPTION_KEY:-}
      - DASH_LICENSE_KEY=${DASH_LICENSE_KEY:-}
      # First super-admin bootstrap (idempotent; ignored once any user exists)
      - DASH_ADMIN_EMAIL=${DASH_ADMIN_EMAIL:-}
      - DASH_ADMIN_PASSWORD=${DASH_ADMIN_PASSWORD:-}
      - DASH_ADMIN_NAME=${DASH_ADMIN_NAME:-Admin}
      - DASH_CONFIG_PATH=/app/dash-config.yaml
    volumes:
      - ./dash-config.yaml:/app/dash-config.yaml:ro
      - uploads_data:/app/backend/uploads
      - branding_data:/app/backend/branding_uploads
      - logs_data:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - dash-network

  nginx:
    image: nginx:1.27-alpine
    container_name: dash-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dash-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  branding_data:
    driver: local
  logs_data:
    driver: local

networks:
  dash-network:
    driver: bridge

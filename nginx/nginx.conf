# =============================================================================
# CityAgent Analytics — nginx reverse proxy
# =============================================================================
# Fronts the app container (listens on 3000 internally) and publishes it on the
# host. Tuned for this app specifically:
#   - SSE / streaming chat       -> proxy_buffering off (tokens stream live)
#   - websockets                 -> Upgrade/Connection passthrough
#   - large file uploads         -> client_max_body_size 0 (no cap; set a number to cap)
#   - long agent runs            -> 1h read/send timeouts (no 504 on slow analysis)
# For HTTPS, terminate TLS here (add a 443 server + certs) or keep using Caddy.
# =============================================================================

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Allow large uploads (data files, branding). 0 = unlimited; set e.g. 1024m to cap.
    client_max_body_size 0;

    # Long-lived requests: agent analysis + streaming can run for minutes.
    proxy_http_version 1.1;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 75s;

    # Websocket upgrade helper.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream dash_app {
        server app:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://dash_app;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # websocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SSE / streaming — never buffer or the chat won't stream token-by-token
            proxy_buffering         off;
            proxy_cache             off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }
    }
}
